services:
  matddns:
    build: .
    image: matddns:latest
    container_name: matddns
    restart: unless-stopped
    ports:
      - "4060:8080"
    environment:
      - TZ=Europe/Berlin
    volumes:
      - ./data:/data
    # let the non-root user send ICMP for the "Ping" failover check
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
